name: PR CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Playwright (smoke + regression)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Smoke tests
        run: npm run test:smoke

      - name: Regression tests
        run: npm run test:regression

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  coverage-gate:
    name: Test-coverage gate
    runs-on: ubuntu-latest
    # Escape hatch: add the "skip-coverage-gate" label to a PR to bypass.
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-coverage-gate') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Flag application changes that lack test changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          changed="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          echo "Changed files:"; echo "$changed"
          code_changed="$(echo "$changed" | grep -E '^(server\.js|public/index\.html)$' || true)"
          test_changed="$(echo "$changed" | grep -E '^test/' || true)"
          if [ -n "$code_changed" ] && [ -z "$test_changed" ]; then
            {
              echo "### ❌ Test-coverage gate"
              echo "Application code changed but no tests were added or updated:"
              echo '```'
              echo "$code_changed"
              echo '```'
              echo "Add or update a Playwright test under \`test/\`, or apply the"
              echo "\`skip-coverage-gate\` label if coverage genuinely isn't needed."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error::Application code changed without accompanying test changes."
            exit 1
          fi
          echo "### ✅ Test-coverage gate passed" >> "$GITHUB_STEP_SUMMARY"
